<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
     <link rel="stylesheet" href="regn.css" />
  </head>

  <body class="bg-secondary-subtle">
    <div class="container-fluid">
      <div class="row">
        <div class="col-3 bg-success py-1">
          <div class="sidebar">
            <div class="profile">
              <div class="profile2"></div>
              <div class="profile3">
                <p>Full Name</p>
                <p>Role in the system</p>
              </div>
            </div>
            <div><a href="#">Dashboard</a></div>
            <div><a href="stock.html">Stock</a></div>
            <div><a href="index.html">Sales</a></div>
            <div><a href="#">Login</a></div>
            <div><a href="#">Reports</a></div>
            <div><a href="supplier-reg.html">Supplier</a></div>
          </div>
        </div>

        <div class="col-9 p-1">
          <form action="">
            <!-- first section -->
            <h1 class="text-center">Stock Registration Form</h1>
            <div class="row my-4 mx-3">
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"
                  >Stock Id</label
                >
                <input
                  type="text"
                  class="form-control"
                  placeholder=""
                  aria-label=""
                />
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"
                  >Item Name</label
                >
                <input
                  type="text"
                  class="form-control"
                  placeholder=""
                  aria-label=""
                />
              </div>
            </div>
            <!-- section two -->
            <div class="row my-4 mx-3">
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"
                  >Category</label
                >
                <select class="form-select" id="category" required>
                  <option selected disabled>Select category</option>
                  <option>Electronics</option>
                  <option>Groceries</option>
                  <option>Office Supplies</option>
                  <option>Clothing</option>
                  <option>Furniture</option>
                  <option>Cleaning Supplies</option>
                  <option>Miscellaneous</option>
                </select>
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"
                  >Quantity</label
                >
                <input
                  type="text"
                  class="form-control"
                  placeholder=""
                  aria-label=""
                />
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"
                  >Unit Price</label
                >
                <input
                  type="text"
                  class="form-control"
                  placeholder=""
                  aria-label=""
                />
              </div>
            </div>
            <!-- section3 -->
            <div class="row my-4 mx-3">
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"
                  >Supplier Name</label
                >
                <input
                  type="text"
                  class="form-control"
                  placeholder=" supplier name"
                  aria-label=""
                />
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"
                  >Date</label
                >
                <input
                  type="date"
                  class="form-control"
                  placeholder=""
                  aria-label=""
                />
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"
                  >Stock Status</label
                >
                <select class="form-select" id="status" required>
                  <option selected disabled>Select status</option>
                  <option>Available</option>
                  <option>Reserved</option>
                  <option>Out of Stock</option>
                  <option>Damaged</option>
                  <option>Pending Arrival</option>
                </select>
              </div>
            </div>
            <div class="my-4 mx-3">
              <label for="validationTextarea" class="form-label"
                >Description</label
              >
              <textarea
                class="form-control"
                id="validationTextarea"
                placeholder="Describe item"
                required
              ></textarea>
            </div>
            <div class="col mx-3 text-center">
              <button type="button" class="btn btn-primary btn-lg">
                Register Stock
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
